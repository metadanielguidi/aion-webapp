<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion - Omniscient Oracle</title>
    <style>
        html, body {
            height: 100vh;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.5s;
        }
        body.dark-mode {
            background-color: #000000;
            color: #ff0055;
        }
        #topology-canvas {
            flex: 1 1 auto;
            width: 100%;
            display: block;
            min-height: 0;
        }
        #chat-interface {
            flex: 0 0 30%;
            height: 30vh;
            min-height: 0;
            box-sizing: border-box;
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        #chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        #upload-btn {
            background: #1a1a1a;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-right: 10px;
        }
        #reset-btn {
            background: #ff0055;
            color: #fff;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        #progress-container {
            display: none;
            height: 3px;
            background: #333;
            width: 100%;
            margin-bottom: 5px;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #00ffcc;
            transition: width 0.1s linear;
        }
        #chat-log {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        input[type="text"] {
            flex-shrink: 0;
            width: 100%;
            box-sizing: border-box;
            background: #1a1a1a;
            color: #00ffcc;
            border: 1px solid #333;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }
    </style>
</head>
<body>
    <canvas id="topology-canvas"></canvas>
    
    <div id="chat-interface">
        <div id="chat-header">
            <span style="font-weight: bold; color: #333;">TEMPORAL FORECASTING TERMINAL</span>
            <div>
                <input type="file" id="file-upload" accept=".txt" style="display: none;" />
                <button id="upload-btn">INGEST .TXT DATA</button>
                <button id="reset-btn">HARD RESET MATRIX</button>
            </div>
        </div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="chat-log">
            <div>[AION_SYS]: Matrix initializing...</div>
        </div>
        <input type="text" id="chat-input" placeholder="Enter your query..." autocomplete="off"/>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
