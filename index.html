<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION: Cognitive Matrix</title>
    <style>
        /* BASE MATRIX AESTHETIC */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* THE VISUAL CORTEX (Background Canvas) */
        #visual-cortex {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* Lets clicks pass through to the terminal */
        }

        /* THE TERMINAL UI */
        .terminal {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            height: 95vh;
            margin-top: 2.5vh;
            display: flex;
            flex-direction: column;
            background: rgba(5, 5, 5, 0.85); /* Dark translucent glass */
            border: 1px solid rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            backdrop-filter: blur(5px);
            padding: 20px;
            box-sizing: border-box;
        }

        /* CHAT LOG */
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 0, 0.2);
            background: rgba(0, 0, 0, 0.5);
            scrollbar-width: thin;
            scrollbar-color: #00ff00 #001100;
        }

        /* Custom Scrollbar for Webkit */
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-track { background: #001100; }
        #chat-box::-webkit-scrollbar-thumb { background: #00ff00; }

        /* MESSAGE STYLES */
        .message {
            margin-bottom: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            text-shadow: 0 0 3px rgba(0, 255, 0, 0.5);
        }
        
        .tag { font-weight: bold; margin-right: 8px; }
        
        .user-message { color: #00ccff; text-shadow: 0 0 3px rgba(0, 204, 255, 0.5); }
        .user-message .tag { color: #00ccff; }

        .oracle-message { color: #00ff00; }
        .oracle-tag { color: #00ff00; }

        .sys-message { color: #ff9900; text-shadow: 0 0 3px rgba(255, 153, 0, 0.5); }
        .sys-tag { color: #ff9900; }

        .dream-message { color: #cc99ff; text-shadow: 0 0 3px rgba(204, 153, 255, 0.5); }
        .dream-tag { color: #cc99ff; }

        /* CONTROLS (Inputs & Buttons) */
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #001100;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
            background: #001a00;
        }

        input[type="file"] {
            display: none; /* Hide default ugly file input */
        }

        .btn {
            background: #001100;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }

        .btn-danger {
            border-color: #ff3333;
            color: #ff3333;
        }

        .btn-danger:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
        }
    </style>
</head>
<body>

    <canvas id="visual-cortex"></canvas>

    <div class="terminal">
        <div id="chat-box"></div>
        
        <div class="controls">
            <input type="text" id="chat-input" placeholder="Query the matrix (Press Enter to execute)..." autocomplete="off">
            
            <label for="file-upload" class="btn">Upload Temporal Data (.txt)</label>
            <input type="file" id="file-upload" accept=".txt">
            
            <button id="reset-btn" class="btn btn-danger">HARD RESET MATRIX</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
