<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion - Neuromorphic Core</title>
    <style>
        html, body {
            height: 100vh; /* Viewport height forces exact window fit */
            width: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0d0d;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.5s;
        }
        body.dark-mode {
            background-color: #000000;
            color: #ff0055;
        }
        #topology-canvas {
            flex: 1 1 auto;
            width: 100%;
            display: block;
            min-height: 0; /* Crucial to prevent flexbox layout collapse on initial load */
        }
        #chat-interface {
            flex: 0 0 30%;
            height: 30vh; /* Explicit fallback height */
            min-height: 0; /* Prevents container from stretching */
            box-sizing: border-box; /* Prevents padding from breaking the 30% height */
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        #chat-log {
            flex: 1;
            min-height: 0; /* Absolutely forces flexbox to allow scrolling */
            overflow-y: auto;
            margin-bottom: 10px;
        }
        input {
            flex-shrink: 0; /* Prevents the input from being squished */
            width: 100%;
            box-sizing: border-box;
            background: #1a1a1a;
            color: #00ffcc;
            border: 1px solid #333;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }
    </style>
</head>
<body>
    <canvas id="topology-canvas"></canvas>
    
    <div id="chat-interface">
        <div id="chat-log">
            <div>[AION_SYS]: Organism initialized. Waiting for input.</div>
        </div>
        <input type="text" id="chat-input" placeholder="Inject stimulus..." autocomplete="off"/>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
